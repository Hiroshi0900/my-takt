name: opsx-full
description: OpenSpec 補助ワークフロー - change 提案、実装、アーカイブを一括実行する。feature spec 中心の通常開発では sdd 系を優先する
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 50
initial_movement: propose

# --- カスタムファセットセクションマップ ---
personas:
  opsx-proposer: ../personas/opsx-proposer.md
  opsx-implementer: ../personas/opsx-implementer.md
  opsx-archiver: ../personas/opsx-archiver.md

instructions:
  propose: ../instructions/opsx-propose.md
  apply: ../instructions/opsx-apply.md
  archive: ../instructions/opsx-archive.md

report_formats:
  opsx-propose-summary: ../output-contracts/opsx-propose-summary.md
  opsx-apply-summary: ../output-contracts/opsx-apply-summary.md
  opsx-archive-summary: ../output-contracts/opsx-archive-summary.md

# --- ムーブメント定義 ---
movements:
  # ===== フェーズ1: 提案 =====
  - name: propose
    edit: true
    persona: opsx-proposer
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: propose
    output_contracts:
      report:
        - name: propose-summary.md
          format: opsx-propose-summary
    rules:
      - condition: すべてのアーティファクトが正常に作成された
        next: apply
      - condition: 変更またはアーティファクトの作成に失敗
        next: ABORT
        appendix: |
          理由:
          - {failure_reason}

  # ===== フェーズ2: 実装 =====
  - name: apply
    edit: true
    persona: opsx-implementer
    session: refresh
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Write
          - Edit
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: apply
    output_contracts:
      report:
        - name: apply-summary.md
          format: opsx-apply-summary
    rules:
      - condition: すべてのタスクが正常に完了
        next: archive
      - condition: ブロックまたは続行不可
        next: ABORT
        appendix: |
          理由:
          - {failure_reason}

  # ===== フェーズ3: アーカイブ =====
  - name: archive
    edit: true
    persona: opsx-archiver
    session: refresh
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Write
          - Bash
    required_permission_mode: edit
    instruction: archive
    output_contracts:
      report:
        - name: archive-summary.md
          format: opsx-archive-summary
    rules:
      - condition: アーカイブが正常に完了
        next: COMPLETE
      - condition: アーカイブに失敗
        next: ABORT
        appendix: |
          理由:
          - {failure_reason}

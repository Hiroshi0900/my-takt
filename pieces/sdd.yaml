name: sdd
description: Spec-Driven Development (superpowers基盤) - brainstorm→計画→TDD実装→検証→レビュー→PR
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 30
initial_movement: check-branch-freshness

# --- カスタムファセット セクションマップ ---
policies:
  pr-batch-size: ../policies/pr-batch-size.md

instructions:
  check-branch-freshness: ../instructions/check-branch-freshness.md
  brainstorm: ../instructions/sp-brainstorm.md
  write-plan: ../instructions/sp-write-plan.md
  implement: ../instructions/sp-implement-tdd.md
  verify: ../instructions/sp-verify.md
  review-arch: ../instructions/review-arch.md
  review-security: ../instructions/review-security.md
  review-qa: ../instructions/review-qa.md
  fix: ../instructions/sp-debug.md
  lint-gate: ../instructions/shared-lint-gate.md
  supervise-pr-batch: ../instructions/shared-supervise-pr-batch.md
  prepare-pr: ../instructions/prepare-pr.md
  create-pr-movement: ../instructions/create-pr-movement.md
  post-pr-summary: ../instructions/post-pr-summary.md

report_formats:
  branch-freshness-check: ../output-contracts/branch-freshness-check.md
  sp-spec-created: ../output-contracts/sp-spec-created.md
  sp-plan-created: ../output-contracts/sp-plan-created.md
  sp-implementation-status: ../output-contracts/sp-implementation-status.md
  sp-verification-result: ../output-contracts/sp-verification-result.md
  sp-debug-result: ../output-contracts/sp-debug-result.md
  pr-preparation: ../output-contracts/pr-preparation.md
  pr-created: ../output-contracts/pr-created.md

# --- ループ監視 ---
loop_monitors:
  - cycle:
      - brainstorm
      - write-plan
    threshold: 2
    judge:
      persona: supervisor
      instruction: |
        brainstorm と write-plan のループが {cycle_count} 回繰り返されました。

        **参照するレポート:**
        - spec: {report:spec-created.md}
        - plan: {report:plan-created.md}

        **判断基準:**
        - spec/plan の内容が実際に修正されているか
        - 同じ needs-revision が繰り返されていないか (曖昧要件のサイン)
      rules:
        - condition: 健全（進捗あり）
          next: brainstorm
        - condition: 非生産的（改善なし）
          next: ABORT

  - cycle:
      - implement
      - verify
    threshold: 3
    judge:
      persona: supervisor
      instruction: |
        implement と verify のループが {cycle_count} 回繰り返されました。

        **参照するレポート:**
        - 実装状況: {report:implementation-status.md}
        - 検証結果: {report:verification-result.md}

        **判断基準:**
        - 未完了タスクが減っているか
        - 検証失敗の原因が変化しているか
      rules:
        - condition: 健全（進捗あり）
          next: implement
        - condition: 非生産的（改善なし）
          next: supervise

  - cycle:
      - reviewers
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: |
        レビュー・修正サイクルが {cycle_count} 回繰り返されました。

        **参照するレポート:**
        - アーキテクチャレビュー: {report:05-architect-review.md}
        - セキュリティレビュー: {report:05b-security-review.md}
        - QAレビュー: {report:06-qa-review.md}
        - デバッグ結果: {report:debug-result.md}

        **判断基準:**
        - 同じ指摘が繰り返されていないか
        - systematic-debugging が escalate タグを出したか
      rules:
        - condition: 健全（進捗あり）
          next: reviewers
        - condition: 非生産的（改善なし）
          next: supervise

# --- Movement定義 ---
movements:
  # ===== Phase 0: ブランチ鮮度確認 =====
  - name: check-branch-freshness
    edit: false
    persona: planner
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    instruction: check-branch-freshness
    output_contracts:
      report:
        - name: branch-freshness.md
          format: branch-freshness-check
    rules:
      - condition: 同期不要（継続推奨）
        next: brainstorm
      - condition: 同期推奨（継続可）
        next: brainstorm
      - condition: 確認不可（継続可）
        next: brainstorm
      - condition: ai("上記いずれにも該当しない")
        next: brainstorm

  # ===== Phase 1: 要件・設計ブレインストーミング =====
  - name: brainstorm
    edit: true
    persona: planner
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: brainstorm
    output_contracts:
      report:
        - name: spec-created.md
          format: sp-spec-created
    rules:
      - condition: "SPEC: ready"
        next: write-plan
      - condition: "SPEC: needs-revision"
        next: brainstorm
      - condition: ai("上記いずれにも該当しない")
        next: ABORT

  # ===== Phase 2: 計画ファイル生成 =====
  - name: write-plan
    edit: true
    persona: planner
    policy: pr-batch-size
    knowledge:
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: write-plan
    output_contracts:
      report:
        - name: plan-created.md
          format: sp-plan-created
    rules:
      - condition: "PLAN: ready"
        next: implement
      - condition: "PLAN: needs-revision"
        next: brainstorm
      - condition: ai("上記いずれにも該当しない")
        next: ABORT

  # ===== Phase 3: 実装 (subagent-driven + TDD) =====
  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - backend
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: implement
    output_contracts:
      report:
        - name: implementation-status.md
          format: sp-implementation-status
    rules:
      - condition: "IMPL: complete"
        next: verify
      - condition: "IMPL: partial"
        next: implement
      - condition: "IMPL: blocked"
        next: supervise
      - condition: ai("上記いずれにも該当しない")
        next: supervise

  # ===== Phase 4: 検証 =====
  - name: verify
    edit: false
    persona: supervisor
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    instruction: verify
    output_contracts:
      report:
        - name: verification-result.md
          format: sp-verification-result
    rules:
      - condition: "VERIFY: pass"
        next: reviewers
      - condition: "VERIFY: fail"
        next: implement
      - condition: ai("上記いずれにも該当しない")
        next: supervise

  # ===== Phase 5: パラレルレビュー =====
  - name: reviewers
    parallel:
      - name: arch-review
        edit: false
        persona: architecture-reviewer
        policy: review
        knowledge:
          - architecture
          - backend
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: review-arch
        output_contracts:
          report:
            - name: 05-architect-review.md
              format: architecture-review
        rules:
          - condition: approved
          - condition: needs_fix
          - condition: ai("上記いずれにも該当しない")

      - name: security-review
        edit: false
        persona: security-reviewer
        policy: review
        knowledge:
          - architecture
          - backend
          - security
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: review-security
        output_contracts:
          report:
            - name: 05b-security-review.md
              format: security-review
        rules:
          - condition: approved
          - condition: needs_fix
          - condition: ai("上記いずれにも該当しない")

      - name: qa-review
        edit: false
        persona: qa-reviewer
        policy:
          - review
          - qa
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: review-qa
        output_contracts:
          report:
            - name: 06-qa-review.md
              format: qa-review
        rules:
          - condition: approved
          - condition: needs_fix
          - condition: ai("上記いずれにも該当しない")

    rules:
      - condition: all("approved", "approved", "approved")
        next: lint-gate
      - condition: any("needs_fix")
        next: fix
      - condition: ai("上記いずれにも該当しない")
        next: supervise

  # ===== Phase 6: 修正 (systematic-debugging) =====
  - name: fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    pass_previous_response: true
    knowledge:
      - backend
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: fix
    output_contracts:
      report:
        - name: debug-result.md
          format: sp-debug-result
    rules:
      - condition: "DEBUG: resolved"
        next: reviewers
      - condition: "DEBUG: investigating"
        next: fix
      - condition: "DEBUG: escalate"
        next: supervise
      - condition: ai("上記いずれにも該当しない")
        next: supervise

  # ===== Phase 7: PR前品質ゲート =====
  - name: lint-gate
    edit: false
    persona: supervisor
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    instruction: lint-gate
    rules:
      - condition: 品質ゲート合格（lint/test/build）
        next: supervise
      - condition: 品質ゲート不合格（lint/test/build）
        next: implement
      - condition: ai("上記いずれにも該当しない")
        next: supervise

  # ===== Phase 8: 最終検証 =====
  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    pass_previous_response: false
    instruction: supervise-pr-batch
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
    rules:
      - condition: すべて問題なし
        next: prepare-pr
      - condition: PRバッチ完了（残タスクありだが今回スコープ達成）
        next: prepare-pr
      - condition: 要求未達成、lint未実行、lint失敗、テスト未実行、テスト失敗、ビルドエラー、Critical/High未解消、Warning理由不足、トレーサビリティ漏れ、OpenAPI差分未解消、再レビュー未解消
        next: implement
      - condition: ai("上記いずれにも該当しない")
        next: prepare-pr

  # ===== Phase 9: デリバリー =====
  - name: prepare-pr
    edit: true
    persona: architecture-reviewer
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - Write
    required_permission_mode: edit
    instruction: prepare-pr
    output_contracts:
      report:
        - name: 08-pr-preparation.md
          format: pr-preparation
    rules:
      - condition: 準備完了（問題なし or 軽微な指摘のみ）
        next: create-pr
      - condition: 重大な問題あり（機密情報漏洩、テスト未実行等）
        next: implement
      - condition: 準備不可（ブランチ問題等）
        next: ABORT
        appendix: |
          PR準備に失敗しました。
          - {エラー詳細}
      - condition: ai("上記いずれにも該当しない")
        next: ABORT

  - name: create-pr
    edit: true
    persona: supervisor
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Bash
    required_permission_mode: edit
    instruction: create-pr-movement
    output_contracts:
      report:
        - name: 09-pr-created.md
          format: pr-created
    rules:
      - condition: PR作成成功
        next: post-pr-summary
      - condition: PR既存（force push + 更新済み）
        next: post-pr-summary
      - condition: PR作成失敗
        next: ABORT
        appendix: |
          PR作成に失敗しました。
          - {エラー詳細}
      - condition: ai("上記いずれにも該当しない")
        next: post-pr-summary

  - name: post-pr-summary
    edit: false
    persona: architecture-reviewer
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Bash
    instruction: post-pr-summary
    rules:
      - condition: 完了
        next: COMPLETE
      - condition: コメントなし
        next: COMPLETE
      - condition: 投稿失敗
        next: COMPLETE
      - condition: ai("上記いずれにも該当しない")
        next: COMPLETE

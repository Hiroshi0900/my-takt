name: opsx-explore
description: OpenSpec 補助フェーズ - アイデア探索と要件明確化を行う。OpenSpec change に接続したい場合のみ使う
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 30
initial_movement: explore

personas:
  opsx-explorer: ../personas/opsx-explorer.md

instructions:
  explore: ../instructions/opsx-explore.md
  capture: ../instructions/opsx-capture.md

report_formats:
  opsx-exploration-memo: ../output-contracts/opsx-exploration-memo.md

movements:
  - name: explore
    edit: false
    persona: opsx-explorer
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: explore
    rules:
      - condition: 探索完了またはユーザーが満足
        next: capture
      - condition: ユーザーが探索の終了を要求
        next: capture

  - name: capture
    edit: true
    persona: opsx-explorer
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Write
          - Bash
    instruction: capture
    output_contracts:
      report:
        - name: opsx-exploration-memo.md
          format: opsx-exploration-memo
    rules:
      - condition: メモの書き込み完了
        next: COMPLETE
      - condition: 記録すべき重要なインサイトなし
        next: COMPLETE

name: opsx-apply
description: OpenSpec Apply - バッチ実装とレビューによる変更タスクの実装
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 50
initial_movement: plan

# --- カスタムファセット セクションマップ ---
instructions:
  plan: ../instructions/opsx-apply-plan.md
  implement: ../instructions/opsx-apply-execute.md

report_formats:
  opsx-apply-summary: ../output-contracts/opsx-apply-summary.md

# --- ループ監視 ---
loop_monitors:
  - cycle:
      - plan
      - implement
    threshold: 5
    judge:
      persona: supervisor
      instruction_template: |
        plan と implement のバッチループが {cycle_count} 回繰り返されました。

        **参照するレポート:**
        - バッチ計画: {report:00-plan.md}
        - 実装スコープ: {report:coder-scope.md}

        **判断基準:**
        - 各サイクルで新しいタスクが完了しているか
        - タスクのチェック数が増えているか
      rules:
        - condition: 健全（進捗あり）
          next: plan
        - condition: 非生産的（改善なし）
          next: ai_review

  - cycle:
      - ai_review
      - ai_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction_template: |
        ai_review と ai_fix のループが {cycle_count} 回繰り返されました。

        **参照するレポート:**
        - AIレビュー結果: {report:04-ai-review.md}

        **判断基準:**
        - 各サイクルで新しい問題が発見・修正されているか
        - 同じ指摘が繰り返されていないか
      rules:
        - condition: 健全（進捗あり）
          next: ai_review
        - condition: 非生産的（改善なし）
          next: supervise

# --- Movement定義 ---
movements:
  # ===== スケジューラー: タスク流動を見てバッチ決定 =====
  - name: plan
    edit: false
    persona: planner
    knowledge: architecture
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
      - WebSearch
      - WebFetch
    instruction: plan
    output_contracts:
      report:
        - name: 00-plan.md
          format: plan
    rules:
      - condition: 未着手タスクあり
        next: implement
      - condition: 全タスク完了
        next: ai_review
      - condition: tasks.mdが存在しない、またはブロック状態
        next: ABORT
        appendix: |
          tasks.md が見つからないかブロック状態です。
          opsx-propose ピースを先に実行してください。
      - condition: 要件が不明確、情報不足
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}

  # ===== 逐次実装: バッチ内タスクのみ実装 =====
  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - backend
      - architecture
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Edit
      - Write
      - Bash
      - WebSearch
      - WebFetch
    required_permission_mode: edit
    instruction: implement
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
    rules:
      - condition: バッチの実装完了
        next: plan
      - condition: 実装中に問題発生、計画の見直しが必要
        next: plan
      - condition: 判断できない、情報不足
        next: plan

  # ===== AIレビュー =====
  - name: ai_review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    allowed_tools:
      - Read
      - Glob
      - Grep
      - WebSearch
      - WebFetch
    instruction: ai-review
    output_contracts:
      report:
        - name: 04-ai-review.md
          format: ai-review
    rules:
      - condition: AI特有の問題なし
        next: lint-gate
      - condition: AI特有の問題あり
        next: ai_fix

  # ===== AI問題修正 =====
  - name: ai_fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - backend
      - architecture
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Edit
      - Write
      - Bash
      - WebSearch
      - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    instruction: ai-fix
    rules:
      - condition: AI問題の修正完了
        next: ai_review
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: lint-gate
      - condition: 判断できない、情報不足
        next: lint-gate

  # ===== PR前品質ゲート（必須） =====
  - name: lint-gate
    edit: false
    persona: supervisor
    policy: review
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
    instruction_template: |
      PR前の実行品質ゲートを検証せよ。

      **必須チェック**
      - `lint` コマンドを特定し、実行して成功を確認する
      - `test` コマンドを特定し、実行して成功を確認する
      - プロジェクト標準の `build` コマンドを実行し、成功を確認する
      - 各コマンドの実行コマンド、終了コード、失敗要点を `supervisor-validation.md` に記録する

      **判定**
      - いずれか未特定・未実行・失敗なら `品質ゲート不合格（lint/test/build）`
      - すべて成功なら `品質ゲート合格（lint/test/build）`
    rules:
      - condition: 品質ゲート合格（lint/test/build）
        next: supervise
      - condition: 品質ゲート不合格（lint/test/build）
        next: plan

  # ===== 最終検証 =====
  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
      - WebSearch
      - WebFetch
    pass_previous_response: false
    instruction_template: |
      ## 監督フェーズ（完了ゲート強化）

      **実行ベース品質ゲート（必須）**
      - `lint` / `test` を特定し、両方を実行して成功を確認する
      - 最低限「プロジェクト標準の build コマンド」と対象テストの実行結果（コマンド・結果・失敗時の対応方針）を `supervisor-validation.md` に記録する（例: Go は `go build ./...`, Node は `npm run build`）
      - `lint` / `test` 未特定・未実行・失敗、および build失敗は完了判定不可

      **完了ゲート（必須）**
      - Critical / High 未解消指摘が 0 件
      - Warning は許容理由が明記されたもの以外 0 件

      **要件トレーサビリティ（必須）**
      - 指示書/Specの要件ごとに、実装箇所（ファイル:行）とテストケース（ファイル:テスト名）を1:1で紐付ける
      - 紐付け漏れがある場合は完了判定不可

      **OpenAPI契約整合（必須）**
      - OpenAPI定義との整合（成功/失敗ステータス、レスポンス型）を確認する
      - 差分が残る場合は完了判定不可

      **再レビュー（必須）**
      - 前回指摘の解消状況をチェックリストで確認する（解消/未解消/許容）
      - 未解消が残る場合は完了判定不可
    instruction: supervise
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: apply-summary.md
          format: opsx-apply-summary
          use_judge: false
    rules:
      - condition: すべて問題なし
        next: COMPLETE
      - condition: 要求未達成、lint未実行、lint失敗、テスト未実行、テスト失敗、ビルドエラー、Critical/High未解消、Warning理由不足、トレーサビリティ漏れ、OpenAPI差分未解消、再レビュー未解消
        next: plan

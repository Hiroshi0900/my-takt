name: fix
description: バグ修正・機能拡張（汎用Go/DDD）- 調査→設計→実装→テスト→ガードレビュー→修正
piece_config:
  provider_options:
    codex:
      network_access: false
    opencode:
      network_access: false
max_movements: 30
initial_movement: investigate

# --- カスタムファセット セクションマップ ---
personas:
  investigator: ../personas/investigator.md
  ddd-designer: ../personas/ddd-designer-generic.md
  implementer: ../personas/implementer-generic.md
  guardian: ../personas/guardian-generic.md

policies:
  go-clean-architecture: ../policies/go-clean-architecture.md
  go-ddd-patterns: ../policies/go-ddd-patterns.md
  go-testing: ../policies/go-testing.md

instructions:
  investigate: ../instructions/investigate-generic.md
  design-domain: ../instructions/design-domain-generic.md
  implement: ../instructions/implement-generic.md
  generate-tests: ../instructions/generate-tests-generic.md
  review-guard: ../instructions/review-guard-generic.md
  review-guard-final: ../instructions/review-guard-final-generic.md

knowledge:
  go-project-structure: ../knowledge/go-project-structure-ddd-clean-architecture.md

report_formats:
  investigation-report: ../output-contracts/investigation-report.md
  design-report: ../output-contracts/design-report.md
  guard-report: ../output-contracts/guard-report.md

# --- ループ監視 ---
loop_monitors:
  - cycle:
      - guard-review
      - fix-issues
    threshold: 3
    judge:
      persona: guardian
      instruction_template: |
        guard-review と fix-issues のループが {cycle_count} 回繰り返されました。

        **参照するレポート:**
        - ガードレールレビュー: {report:guard-report.md}

        **判断基準:**
        - 各サイクルで新しい問題が修正されているか
        - 同じ指摘が繰り返されていないか
      rules:
        - condition: 健全（進捗あり）
          next: guard-review
        - condition: 非生産的（改善なし）
          next: ABORT

# --- Movement定義 ---
movements:
  # ===== Phase 1: 既存コード調査 =====
  - name: investigate
    edit: false
    persona: investigator
    policy: go-clean-architecture
    knowledge: go-project-structure
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
    instruction: investigate
    output_contracts:
      report:
        - name: investigation-report.md
          format: investigation-report
    rules:
      - condition: 調査完了、根本原因と修正方針が明確
        next: design-fix
      - condition: 情報不足、調査継続が必要
        next: investigate
      - condition: 問題の特定不可能
        next: ABORT
        appendix: |
          調査で特定できなかった情報:
          - {不明点}

  # ===== Phase 2: 修正設計 =====
  - name: design-fix
    edit: false
    persona: ddd-designer
    policy:
      - go-ddd-patterns
      - go-clean-architecture
    knowledge: go-project-structure
    allowed_tools:
      - Read
      - Glob
      - Grep
    instruction: design-domain
    output_contracts:
      report:
        - name: design-report.md
          format: design-report
    rules:
      - condition: 設計完了、最小変更方針が確定
        next: implement
      - condition: 追加調査が必要
        next: investigate

  # ===== Phase 3: 実装 =====
  - name: implement
    edit: true
    persona: implementer
    policy:
      - go-clean-architecture
      - go-ddd-patterns
    knowledge: go-project-structure
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Edit
      - Write
      - Bash
    required_permission_mode: edit
    instruction: implement
    rules:
      - condition: 実装完了（go buildが通る）
        next: generate-tests
      - condition: 実装中に設計の問題を発見
        next: design-fix

  # ===== Phase 4: テスト生成 =====
  - name: generate-tests
    edit: true
    persona: implementer
    policy: go-testing
    knowledge: go-project-structure
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Edit
      - Write
      - Bash
    required_permission_mode: edit
    instruction: generate-tests
    rules:
      - condition: テスト生成完了
        next: guard-review
      - condition: テスト実行でエラー発見
        next: implement

  # ===== Phase 5: ガードレールレビュー =====
  - name: guard-review
    edit: false
    persona: guardian
    policy:
      - go-clean-architecture
      - go-ddd-patterns
      - go-testing
    knowledge: go-project-structure
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
    instruction: review-guard-final
    output_contracts:
      report:
        - name: guard-report.md
          format: guard-report
    rules:
      - condition: 問題なし（Critical/High未解消0、Warning理由明記、要件1:1トレーサビリティ充足、OpenAPI差分0、lint/test/build成功）
        next: COMPLETE
      - condition: Critical/High未解消またはWarning理由不足、トレーサビリティ漏れ、OpenAPI差分、lint/test/build失敗
        next: fix-issues

  # ===== Phase 6: 指摘修正 =====
  - name: fix-issues
    edit: true
    persona: implementer
    policy:
      - go-clean-architecture
      - go-ddd-patterns
      - go-testing
    knowledge: go-project-structure
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Edit
      - Write
      - Bash
    required_permission_mode: edit
    pass_previous_response: false
    instruction: implement
    rules:
      - condition: 修正完了
        next: guard-review
      - condition: 設計の見直しが必要
        next: design-fix

name: sdd-impl
description: SDD Phase 4 - タスクに基づく適応型バッチ実装を実行する
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 50
initial_movement: check-branch-freshness

# --- カスタムファセット セクションマップ ---
policies:
  pr-batch-size: ../policies/pr-batch-size.md

instructions:
  check-branch-freshness: ../instructions/check-branch-freshness.md
  plan: ../instructions/impl-plan.md
  implement: ../instructions/impl-execute.md

report_formats:
  branch-freshness-check: ../output-contracts/branch-freshness-check.md

# --- ループ監視 ---
loop_monitors:
  - cycle:
      - plan
      - implement
    threshold: 5
    judge:
      persona: supervisor
      instruction_template: |
        plan と implement のバッチループが {cycle_count} 回繰り返されました。

        **参照するレポート:**
        - バッチ計画: {report:00-plan.md}
        - 実装スコープ: {report:coder-scope.md}

        **判断基準:**
        - 各サイクルで新しいタスクが完了しているか
        - tasks.md のチェック数が増えているか
      rules:
        - condition: 健全（進捗あり）
          next: plan
        - condition: 非生産的（改善なし）
          next: ai_review

  - cycle:
      - ai_review
      - ai_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction_template: |
        ai_review と ai_fix のループが {cycle_count} 回繰り返されました。

        **参照するレポート:**
        - AIレビュー結果: {report:04-ai-review.md}

        **判断基準:**
        - 各サイクルで新しい問題が発見・修正されているか
        - 同じ指摘が繰り返されていないか
      rules:
        - condition: 健全（進捗あり）
          next: ai_review
        - condition: 非生産的（改善なし）
          next: supervise

# --- Movement定義 ---
movements:
  # ===== 事前確認: 作業ブランチの鮮度チェック =====
  - name: check-branch-freshness
    edit: false
    persona: planner
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
    instruction: check-branch-freshness
    output_contracts:
      report:
        - name: branch-freshness.md
          format: branch-freshness-check
    rules:
      - condition: 同期不要（継続推奨）
        next: plan
      - condition: 同期推奨（継続可）
        next: plan
      - condition: 確認不可（継続可）
        next: plan

  # ===== スケジューラー: タスク流動を見てバッチ決定 =====
  - name: plan
    edit: false
    persona: planner
    policy: pr-batch-size
    knowledge: architecture
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
      - WebSearch
      - WebFetch
    instruction: plan
    output_contracts:
      report:
        - name: 00-plan.md
          format: plan
    rules:
      - condition: 未着手の逐次タスクあり
        next: implement
      - condition: PRバッチ完了（残タスクあり、今回セッションを完了してよい）
        next: ai_review
      - condition: 全タスク完了
        next: ai_review
      - condition: tasks.mdが存在しない、または空
        next: ABORT
        appendix: |
          tasks.md が見つからないか空です。
          sdd-tasks ピースを先に実行してください。
      - condition: 要件が不明確、情報不足
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}

  # ===== 逐次実装: バッチ内タスクのみ実装 =====
  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - backend
      - architecture
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Edit
      - Write
      - Bash
      - WebSearch
      - WebFetch
    required_permission_mode: edit
    instruction: implement
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
    rules:
      - condition: バッチの実装完了
        next: plan
      - condition: 実装中に問題発生、計画の見直しが必要
        next: plan
      - condition: 判断できない、情報不足
        next: plan

  # ===== AIレビュー =====
  - name: ai_review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    allowed_tools:
      - Read
      - Glob
      - Grep
      - WebSearch
      - WebFetch
    instruction: ai-review
    output_contracts:
      report:
        - name: 04-ai-review.md
          format: ai-review
    rules:
      - condition: AI特有の問題なし
        next: lint-gate
      - condition: AI特有の問題あり
        next: ai_fix

  # ===== AI問題修正 =====
  - name: ai_fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - backend
      - architecture
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Edit
      - Write
      - Bash
      - WebSearch
      - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    instruction: ai-fix
    rules:
      - condition: AI問題の修正完了
        next: ai_review
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: lint-gate
      - condition: 判断できない、情報不足
        next: lint-gate

  # ===== PR前品質ゲート（必須） =====
  - name: lint-gate
    edit: false
    persona: supervisor
    policy: review
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
    instruction_template: |
      PR前の実行品質ゲートを検証せよ。

      **必須チェック**
      - `lint` コマンドを特定し、実行して成功を確認する
      - `test` コマンドを特定し、実行して成功を確認する
      - プロジェクト標準の `build` コマンドを実行し、成功を確認する
      - 各コマンドの実行コマンド、終了コード、失敗要点を `supervisor-validation.md` に記録する

      **判定**
      - いずれか未特定・未実行・失敗なら `品質ゲート不合格（lint/test/build）`
      - すべて成功なら `品質ゲート合格（lint/test/build）`
    rules:
      - condition: 品質ゲート合格（lint/test/build）
        next: supervise
      - condition: 品質ゲート不合格（lint/test/build）
        next: plan

  # ===== 最終検証 =====
  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    allowed_tools:
      - Read
      - Glob
      - Grep
      - Bash
      - WebSearch
      - WebFetch
    pass_previous_response: false
    instruction_template: |
      ## 監督フェーズ（PRバッチ完了対応）
      今回は全タスク完了だけでなく、「現在のPRバッチが完了しており、残タスクは次回セッションへ回してよい」場合も完了可能です。

      **実行ベース品質ゲート（追加・必須）**
      - `lint` と `test` のコマンドをリポジトリ定義（make / task / just / package scripts / CI）から特定し、両方を実行して成功を確認する
      - `lint` または `test` が未特定・未実行・失敗の場合は、`すべて問題なし` / `PRバッチ完了（残タスクありだが今回スコープ達成）` を選んではならない
      - 最低限「プロジェクト標準の build コマンド」と対象テストの実行結果（コマンド・結果・失敗時の対応方針）を `supervisor-validation.md` に記録する（例: Go は `go build ./...`, Node は `npm run build`）
      - `build` は該当する場合に実行し、失敗時は完了判定に進まない

      **完了ゲート（追加・必須）**
      - Critical / High の未解消指摘が 0 件であること
      - Warning は許容理由が明記されたもの以外を 0 件であること

      **要件トレーサビリティ（追加・必須）**
      - 指示書/Specの全要件について、実装箇所（ファイル:行）とテストケース（ファイル:テスト名）の1:1対応を確認する
      - 紐付け漏れが1件でもある場合は完了判定に進まない

      **OpenAPI契約整合（追加・必須）**
      - OpenAPI定義と実装挙動の差分（成功/失敗ステータス、レスポンス型）を確認する
      - 差分が1件でもある場合は完了判定に進まない

      **再レビュー（追加・必須）**
      - 修正後に前回指摘の解消状況チェックリスト（解消/未解消/許容）を確認する
      - 未解消指摘が1件でもある場合は完了判定に進まない

      **判定ルール（追加）**
      - 実装品質・テスト・ビルド観点で今回バッチに重大な問題がない（`lint` / `test` 成功を含む）
      - `00-plan.md` の PRバッチ進捗で現在バッチが完了扱いにできる
      - tasks.md に未完了タスクが残っていても、別PRバッチ/将来バッチとして分離されている

      上記を満たす場合は condition: `PRバッチ完了（残タスクありだが今回スコープ達成）` を選択してください。
    instruction: supervise
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
    rules:
      - condition: すべて問題なし
        next: COMPLETE
      - condition: PRバッチ完了（残タスクありだが今回スコープ達成）
        next: COMPLETE
      - condition: 要求未達成、lint未実行、lint失敗、テスト未実行、テスト失敗、ビルドエラー、Critical/High未解消、Warning理由不足、トレーサビリティ漏れ、OpenAPI差分未解消、再レビュー未解消
        next: plan

name: sdd-impl
description: SDD Phase 4 - superpowers計画からTDDバッチ実装を実行する
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 15
initial_movement: check-branch-freshness

# --- カスタムファセット セクションマップ ---
policies:
  pr-batch-size: ../policies/pr-batch-size.md

instructions:
  check-branch-freshness: ../instructions/check-branch-freshness.md
  load-plan: ../instructions/load-plan.md
  implement: ../instructions/sp-implement-tdd.md
  verify: ../instructions/sp-verify.md
  review-arch: ../instructions/review-arch.md
  review-security: ../instructions/review-security.md
  review-qa: ../instructions/review-qa.md
  fix: ../instructions/sp-debug.md
  lint-gate: ../instructions/shared-lint-gate.md
  supervise-pr-batch: ../instructions/shared-supervise-pr-batch.md

report_formats:
  branch-freshness-check: ../output-contracts/branch-freshness-check.md
  sp-implementation-status: ../output-contracts/sp-implementation-status.md
  sp-verification-result: ../output-contracts/sp-verification-result.md
  sp-debug-result: ../output-contracts/sp-debug-result.md

# --- ループ監視 ---
loop_monitors:
  - cycle:
      - implement
      - verify
    threshold: 3
    judge:
      persona: supervisor
      instruction: |
        implement と verify のループが {cycle_count} 回繰り返されました。

        **参照するレポート:**
        - 実装状況: {report:implementation-status.md}
        - 検証結果: {report:verification-result.md}

        **判断基準:**
        - 各サイクルで未完了タスクが減っているか
        - 検証失敗の原因が変化しているか（同じエラーの繰り返しは非生産的）
      rules:
        - condition: 健全（進捗あり）
          next: implement
        - condition: 非生産的（改善なし）
          next: supervise

  - cycle:
      - reviewers
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: |
        レビュー・修正サイクルが {cycle_count} 回繰り返されました。

        **参照するレポート:**
        - アーキテクチャレビュー: {report:05-architect-review.md}
        - セキュリティレビュー: {report:05b-security-review.md}
        - QAレビュー: {report:06-qa-review.md}
        - デバッグ結果: {report:debug-result.md}

        **判断基準:**
        - 同じ指摘が繰り返されていないか
        - systematic-debugging が escalate タグを出したか
      rules:
        - condition: 健全（進捗あり）
          next: reviewers
        - condition: 非生産的（改善なし）
          next: supervise

# --- Movement定義 ---
movements:
  # ===== 事前確認: 作業ブランチの鮮度チェック =====
  - name: check-branch-freshness
    edit: false
    persona: planner
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    instruction: check-branch-freshness
    output_contracts:
      report:
        - name: branch-freshness.md
          format: branch-freshness-check
    rules:
      - condition: 同期不要（継続推奨）
        next: load-plan
      - condition: 同期推奨（継続可）
        next: load-plan
      - condition: 確認不可（継続可）
        next: load-plan
      - condition: ai("上記いずれにも該当しない")
        next: load-plan

  # ===== 計画ロード: superpowers plan ファイルを読み込み =====
  - name: load-plan
    edit: false
    persona: planner
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    instruction: load-plan
    rules:
      - condition: 計画有効
        next: implement
      - condition: 計画不足・不備
        next: ABORT
        appendix: |
          docs/superpowers/plans/ 配下に有効な計画ファイルが見つかりません。
          先に sdd ピース (brainstorm / write-plan フェーズ含む) を実行してください。
      - condition: ai("上記いずれにも該当しない")
        next: ABORT

  # ===== 実装: subagent-driven + TDD (1バッチ≤3ファイル/10分) =====
  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    knowledge:
      - backend
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: implement
    output_contracts:
      report:
        - name: implementation-status.md
          format: sp-implementation-status
    rules:
      - condition: "IMPL: complete"
        next: verify
      - condition: "IMPL: partial"
        next: implement
      - condition: "IMPL: blocked"
        next: supervise
      - condition: ai("上記いずれにも該当しない")
        next: supervise

  # ===== 検証: verification-before-completion =====
  - name: verify
    edit: false
    persona: supervisor
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    instruction: verify
    output_contracts:
      report:
        - name: verification-result.md
          format: sp-verification-result
    rules:
      - condition: "VERIFY: pass"
        next: reviewers
      - condition: "VERIFY: fail"
        next: implement
      - condition: ai("上記いずれにも該当しない")
        next: supervise

  # ===== パラレルレビュー =====
  - name: reviewers
    parallel:
      - name: arch-review
        edit: false
        persona: architecture-reviewer
        policy: review
        knowledge:
          - architecture
          - backend
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: review-arch
        output_contracts:
          report:
            - name: 05-architect-review.md
              format: architecture-review
        rules:
          - condition: approved
          - condition: needs_fix
          - condition: ai("上記いずれにも該当しない")

      - name: security-review
        edit: false
        persona: security-reviewer
        policy: review
        knowledge:
          - architecture
          - backend
          - security
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: review-security
        output_contracts:
          report:
            - name: 05b-security-review.md
              format: security-review
        rules:
          - condition: approved
          - condition: needs_fix
          - condition: ai("上記いずれにも該当しない")

      - name: qa-review
        edit: false
        persona: qa-reviewer
        policy:
          - review
          - qa
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: review-qa
        output_contracts:
          report:
            - name: 06-qa-review.md
              format: qa-review
        rules:
          - condition: approved
          - condition: needs_fix
          - condition: ai("上記いずれにも該当しない")

    rules:
      - condition: all("approved", "approved", "approved")
        next: lint-gate
      - condition: any("needs_fix")
        next: fix
      - condition: ai("上記いずれにも該当しない")
        next: supervise

  # ===== 修正: systematic-debugging (3回でエスカレート) =====
  - name: fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
    session: refresh
    pass_previous_response: true
    knowledge:
      - backend
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: fix
    output_contracts:
      report:
        - name: debug-result.md
          format: sp-debug-result
    rules:
      - condition: "DEBUG: resolved"
        next: reviewers
      - condition: "DEBUG: investigating"
        next: fix
      - condition: "DEBUG: escalate"
        next: supervise
      - condition: ai("上記いずれにも該当しない")
        next: supervise

  # ===== PR前品質ゲート =====
  - name: lint-gate
    edit: false
    persona: supervisor
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    instruction: lint-gate
    rules:
      - condition: 品質ゲート合格（lint/test/build）
        next: supervise
      - condition: 品質ゲート不合格（lint/test/build）
        next: implement
      - condition: ai("上記いずれにも該当しない")
        next: supervise

  # ===== 最終検証 =====
  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    pass_previous_response: false
    instruction: supervise-pr-batch
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
    rules:
      - condition: すべて問題なし
        next: COMPLETE
      - condition: PRバッチ完了（残タスクありだが今回スコープ達成）
        next: COMPLETE
      - condition: 要求未達成、lint未実行、lint失敗、テスト未実行、テスト失敗、ビルドエラー、Critical/High未解消、Warning理由不足、トレーサビリティ漏れ、OpenAPI差分未解消、再レビュー未解消
        next: implement
      - condition: ai("上記いずれにも該当しない")
        next: COMPLETE
